# CDP Service Configuration
service:
  host: 127.0.0.1
  port: 3100
  authToken: ${CDP_SERVICE_TOKEN}

isolation:
  strategy: dynamic          # static | dynamic
  default: context           # process | context | session
  rules:
    - pattern: "agent-.*"
      level: context
    - pattern: "heavy-.*"
      level: process

cdp:
  endpoints:
    - url: http://localhost:9222
      weight: 1
  connectionPool:
    maxPerEndpoint: 10
    idleTimeoutMs: 300000    # 5 minutes

browser:
  defaultMode: shared        # shared | dedicated
  shared:
    cdpUrl: http://localhost:9222
  dedicated:
    enabled: true
    executablePath: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
    host: 127.0.0.1
    startingPort: 9230
    maxInstances: 10
    idleTimeoutMs: 300000
    startupTimeoutMs: 15000
    headless: false
    userDataDirBase: /tmp/browser-automation-sessions
    extraArgs: []
  profiles:
    workspaceRootName: .browser-automation/profiles
    globalRootDir: /tmp/browser-automation-profiles
    defaultScope: workspace
    metadataFileName: profile.json
    lockFileName: lock
    lockTimeoutMs: 30000
    retention:
      keepWorkspaceProfiles: true
      keepGlobalProfiles: true
      cleanupFreshOnShutdown: true
      cleanupFreshOnIdle: true
    migration:
      tempDir: /tmp/browser-automation-profile-migrations
  target:
    createUrl: about:blank
    enforceOwnership: true
    allowClientTargetOverride: false
  cleanupIntervalMs: 30000

timeouts:
  defaultBudgetMs: 30000     # 30 seconds
  maxBudgetMs: 120000        # 2 minutes
  gracefulTerminationMs: 5000

monitoring:
  metricsPort: 3101
  logLevel: info
  enableTracing: false
